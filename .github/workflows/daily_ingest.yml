name: Daily Truth Social Feed

on:
  schedule:
    - cron: "0 12 * * *"  # 7:00 AM EST (UTC-5) / 8:00 AM EDT (UTC-4)
  workflow_dispatch:  # Manual trigger

jobs:
  ingest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Run pipeline
        run: uv run python -m ttsfeed.pipeline
        env:
          LOG_LEVEL: ${{ vars.LOG_LEVEL }}
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}
          LLM_MODELS: ${{ vars.LLM_MODELS }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SENDER_GMAIL: ${{ secrets.SENDER_GMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/raw/ data/enriched/ data/logs/
          if git diff --cached --quiet; then
            echo "No new data to commit"
          else
            git commit -m "data: daily feed $(date -u +%Y-%m-%d)"
            git push
          fi
